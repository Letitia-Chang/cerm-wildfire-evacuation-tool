<svg viewBox="0 0 1320 1162" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif" role="img">
<title>CERM architecture</title>
<desc>Offline data pipeline feeds committed data files, which feed three parallel evaluation notebooks and the live browser app; the live app calls a Vercel proxy to DeepSeek for free-text tagging with a rule-based fallback.</desc>
